<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Безопасно или опасно</title>

<style>
:root{
  --bg1:#f7d79c;
  --bg2:#efb86a;
  --card:#fffaf0;
  --card2:#f6efe0;
  --text:#2a2a2a;
  --good:#34b36b;
  --bad:#ef4b4b;
  --blue:#2e7dff;
  --danger:#ef4b4b;
  --safe:#34b36b;
  --shadow:0 10px 24px rgba(0,0,0,.16);
  --radius:22px;
}

*{
  box-sizing:border-box;
  -webkit-user-select:none;
  -moz-user-select:none;
  -ms-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}

html,body{
  width:100%;
  height:100%;
  margin:0;
  overflow:hidden;
  font-family:"Trebuchet MS","Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 15% 10%, rgba(255,255,255,.35), transparent 18%),
    radial-gradient(circle at 90% 12%, rgba(255,255,255,.22), transparent 14%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
}

img{
  -webkit-user-drag:none;
  user-drag:none;
  pointer-events:none;
}

.app{
  width:100vw;
  height:100vh;
  padding:14px;
}

.board{
  width:100%;
  height:100%;
  position:relative;
  border-radius:28px;
  padding:14px;
  overflow:hidden;
}

.game{
  width:100%;
  height:calc(100% - 90px);
  max-width:1120px;
  margin:0 auto;
  display:grid;
  grid-template-rows:1.15fr .85fr;
  gap:22px;
}

/* Верхняя зона со слотами */
.zones{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  min-height:0;
}

.zone{
  position:relative;
  border-radius:28px;
  padding:18px;
  background:rgba(255,255,255,.38);
  box-shadow:inset 0 0 0 4px rgba(255,255,255,.42);
  display:flex;
  flex-direction:column;
  gap:14px;
}

.zone.danger{
  box-shadow:
    inset 0 0 0 4px rgba(239,75,75,.25),
    0 10px 22px rgba(0,0,0,.08);
}

.zone.safe{
  box-shadow:
    inset 0 0 0 4px rgba(52,179,107,.25),
    0 10px 22px rgba(0,0,0,.08);
}

.zone-title{
  height:46px;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  font-weight:900;
  color:#fff;
  text-transform:uppercase;
  letter-spacing:.5px;
  box-shadow:var(--shadow);
}

.zone.danger .zone-title{
  background:var(--danger);
}

.zone.safe .zone-title{
  background:var(--safe);
}

.slots{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:repeat(2,1fr);
  gap:12px;
  min-height:0;
}

.slot{
  position:relative;
  border-radius:22px;
  border:4px dashed rgba(255,255,255,.85);
  background:rgba(255,255,255,.38);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
  transition:.15s;
  cursor:pointer;
  min-height:0;
}

.slot:hover{
  transform:translateY(-2px);
  background:rgba(255,255,255,.56);
}

.slot.empty::before{
  content:'Нажми сюда';
  font-size:14px;
  font-weight:900;
  color:rgba(95,76,47,.7);
  text-transform:uppercase;
}

.slot.filled{
  border-style:solid;
  border-color:var(--good);
  background:rgba(255,255,255,.65);
  box-shadow:
    0 0 0 5px rgba(52,179,107,.22),
    0 12px 28px rgba(52,179,107,.28);
  cursor:default;
}

.slot.filled:hover{
  transform:none;
}

/* Нижняя зона карточек */
.cards-area{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  align-items:stretch;
}

/* Карточка снизу: слева картинка, справа текст */
.card{
  position:relative;
  background:linear-gradient(180deg,var(--card),var(--card2));
  border-radius:var(--radius);
  border:4px solid rgba(255,255,255,.95);
  box-shadow:var(--shadow);
  overflow:visible;
  padding:10px;
  display:grid;
  grid-template-columns:72px 1fr;
  gap:10px;
  align-items:center;
  transition:.15s;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-2px);
}

.card-img{
  width:72px;
  height:72px;
  border-radius:14px;
  overflow:hidden;
  background:#fff;
  flex-shrink:0;
}

.card-img img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  pointer-events:none;
  -webkit-user-drag:none;
}

.card-text{
  text-align:left;
  font-size:14px;
  font-weight:900;
  line-height:1.2;
  color:var(--text);
  display:flex;
  align-items:center;
}

.card.selected{
  border-color:var(--blue);
  box-shadow:
    0 0 0 5px rgba(46,125,255,.25),
    0 12px 28px rgba(46,125,255,.30);
  transform:translateY(-4px);
}

.card.matched{
  opacity:.35;
  border-color:var(--good);
  box-shadow:
    0 0 0 5px rgba(52,179,107,.16),
    0 12px 28px rgba(52,179,107,.22);
  cursor:default;
  transform:none;
}

.card.matched:hover{
  transform:none;
}

.card.wrong{
  border-color:var(--bad);
  box-shadow:
    0 0 0 5px rgba(239,75,75,.20),
    0 12px 28px rgba(239,75,75,.28);
  animation:shake .28s linear;
}

@keyframes shake{
  0%{ transform:translateX(0); }
  25%{ transform:translateX(-6px); }
  50%{ transform:translateX(6px); }
  75%{ transform:translateX(-4px); }
  100%{ transform:translateX(0); }
}

/* Карточка внутри верхнего слота */
.slot-card{
  width:100%;
  height:100%;
  border-radius:18px;
  background:linear-gradient(180deg,var(--card),var(--card2));
  border:4px solid var(--good);
  padding:8px;
  display:grid;
  grid-template-columns:58px 1fr;
  gap:8px;
  align-items:center;
  opacity:.72;
  box-shadow:
    0 0 0 5px rgba(52,179,107,.18),
    0 8px 18px rgba(52,179,107,.22);
}

.slot-card-img{
  width:58px;
  height:58px;
  border-radius:12px;
  overflow:hidden;
  background:#fff;
}

.slot-card-img img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  pointer-events:none;
  -webkit-user-drag:none;
}

.slot-card .card-text{
  font-size:12px;
  text-align:left;
  line-height:1.15;
}

/* Галочка / крестик */
.marker{
  position:absolute;
  top:8px;
  right:8px;
  width:30px;
  height:30px;
  border-radius:50%;
  display:grid;
  place-items:center;
  font-size:19px;
  font-weight:900;
  color:#fff;
  opacity:0;
  transform:scale(.6);
  transition:.15s;
  pointer-events:none;
}

.marker.show{
  opacity:1;
  transform:scale(1);
}

.marker.good{
  background:var(--good);
}

.marker.bad{
  background:var(--bad);
}

/* Нижняя панель */
.footer{
  height:90px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  max-width:1120px;
  margin:0 auto;
}

.progress{
  background:rgba(255,255,255,.75);
  padding:10px 14px;
  border-radius:999px;
  font-weight:800;
}

.restart{
  border:none;
  border-radius:999px;
  padding:12px 18px;
  font-weight:900;
  cursor:pointer;
  background:#fff6d7;
  box-shadow:var(--shadow);
}

.feedback{
  position:absolute;
  left:50%;
  bottom:86px;
  transform:translateX(-50%);
  background:#fff;
  padding:12px 18px;
  border-radius:999px;
  font-weight:900;
  box-shadow:var(--shadow);
  opacity:0;
  transition:.2s;
  pointer-events:none;
  z-index:20;
}

.feedback.show{
  opacity:1;
}

@media(max-width:900px){
  .game{
    grid-template-rows:1.2fr .8fr;
    gap:14px;
  }

  .zones{
    grid-template-columns:1fr;
    gap:12px;
  }

  .slots{
    grid-template-columns:repeat(2,1fr);
  }

  .cards-area{
    grid-template-columns:repeat(2,1fr);
  }

  .zone-title{
    font-size:18px;
    height:38px;
  }

  .card{
    grid-template-columns:60px 1fr;
  }

  .card-img{
    width:60px;
    height:60px;
  }

  .card-text{
    font-size:12px;
  }

  .slot-card{
    grid-template-columns:48px 1fr;
  }

  .slot-card-img{
    width:48px;
    height:48px;
  }

  .slot-card .card-text{
    font-size:11px;
  }
}
</style>
</head>

<body>
<div class="app">
  <div class="board">

    <div class="game">

      <div class="zones">

        <!-- Слева опасно -->
        <div class="zone danger">
          <div class="zone-title">Опасно</div>
          <div class="slots" id="dangerSlots"></div>
        </div>

        <!-- Справа безопасно -->
        <div class="zone safe">
          <div class="zone-title">Безопасно</div>
          <div class="slots" id="safeSlots"></div>
        </div>

      </div>

      <!-- Снизу карточки -->
      <div class="cards-area" id="cardsArea"></div>

    </div>

    <div class="footer">
      <div class="progress" id="progress">0 / 8 размещено</div>
      <button class="restart" id="restartBtn">Начать заново</button>
    </div>

    <div class="feedback" id="feedback"></div>

  </div>
</div>

<script>
document.addEventListener('selectstart', e => e.preventDefault());
document.addEventListener('dragstart', e => e.preventDefault());

const cards = [
  {
    id:'c1',
    text:'Пользоваться электроприборами мокрыми руками',
    type:'danger',
    src:'1.png'
  },
  {
    id:'c2',
    text:'Смотреть по сторонам перед переходом дороги',
    type:'safe',
    src:'2.png'
  },
  {
    id:'c3',
    text:'Проверять, выключен ли газ и свет перед уходом',
    type:'safe',
    src:'3.png'
  },
  {
    id:'c4',
    text:'Идти домой только по безопасному маршруту',
    type:'safe',
    src:'4.png'
  },
  {
    id:'c5',
    text:'Закрывать дверь изнутри когда дома нет взрослых',
    type:'safe',
    src:'5.png'
  },
  {
    id:'c6',
    text:'Брать лекарства без разрешения взрослых',
    type:'danger',
    src:'6.png'
  },
  {
    id:'c7',
    text:'Разговаривать с незнакомцами и идти за ними',
    type:'danger',
    src:'7.png'
  },
  {
    id:'c8',
    text:'Играть рядом с проезжей частью',
    type:'danger',
    src:'8.png'
  }
];

const dangerSlots = document.getElementById('dangerSlots');
const safeSlots = document.getElementById('safeSlots');
const cardsArea = document.getElementById('cardsArea');
const progress = document.getElementById('progress');
const feedback = document.getElementById('feedback');

let selectedCard = null;
let placedCount = 0;

function shuffle(arr){
  const a = [...arr];

  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }

  return a;
}

function render(){
  dangerSlots.innerHTML = '';
  safeSlots.innerHTML = '';
  cardsArea.innerHTML = '';

  selectedCard = null;
  placedCount = 0;

  createSlots('danger', 4, dangerSlots);
  createSlots('safe', 4, safeSlots);

  shuffle(cards).forEach(item => {
    cardsArea.appendChild(createCard(item));
  });

  updateProgress();
}

function createSlots(type, count, parent){
  for(let i = 0; i < count; i++){
    const slot = document.createElement('div');
    slot.className = 'slot empty';
    slot.dataset.type = type;

    slot.addEventListener('click', () => {
      selectSlot(slot);
    });

    parent.appendChild(slot);
  }
}

function createCard(item){
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id = item.id;
  card.dataset.type = item.type;
  card.dataset.text = item.text;
  card.dataset.src = item.src;

  const imgBox = document.createElement('div');
  imgBox.className = 'card-img';

  const img = document.createElement('img');
  img.src = item.src;
  img.alt = '';

  imgBox.appendChild(img);

  const text = document.createElement('div');
  text.className = 'card-text';
  text.innerText = item.text;

  const marker = document.createElement('div');
  marker.className = 'marker';
  marker.innerText = '✓';

  card.append(imgBox, text, marker);

  card.addEventListener('click', () => {
    selectCard(card);
  });

  return card;
}

function selectCard(card){
  if(card.classList.contains('matched')) return;

  if(selectedCard){
    selectedCard.classList.remove('selected');
  }

  selectedCard = card;
  selectedCard.classList.add('selected');

  show('Теперь выберите место сверху');
}

function selectSlot(slot){
  if(slot.classList.contains('filled')) return;

  if(!selectedCard){
    show('Сначала выберите карточку снизу');
    return;
  }

  if(selectedCard.dataset.type === slot.dataset.type){
    placeCard(selectedCard, slot);
    show('Правильно!');
  }else{
    wrong(selectedCard);
    show('Неправильно');
  }

  if(selectedCard){
    selectedCard.classList.remove('selected');
  }

  selectedCard = null;
}

function placeCard(card, slot){
  slot.classList.remove('empty');
  slot.classList.add('filled');

  const slotCard = document.createElement('div');
  slotCard.className = 'slot-card';

  const imgBox = document.createElement('div');
  imgBox.className = 'slot-card-img';

  const img = document.createElement('img');
  img.src = card.dataset.src;
  img.alt = '';

  imgBox.appendChild(img);

  const text = document.createElement('div');
  text.className = 'card-text';
  text.innerText = card.dataset.text;

  slotCard.append(imgBox, text);
  slot.appendChild(slotCard);

  card.classList.add('matched');
  ok(card);

  placedCount++;
  updateProgress();
}

function ok(card){
  const m = card.querySelector('.marker');
  m.classList.add('show','good');
  m.classList.remove('bad');
  m.innerText = '✓';
}

function wrong(card){
  card.classList.add('wrong');

  const m = card.querySelector('.marker');
  m.classList.add('show','bad');
  m.classList.remove('good');
  m.innerText = '✕';

  setTimeout(() => {
    card.classList.remove('wrong');

    if(!card.classList.contains('matched')){
      m.classList.remove('show','bad');
    }
  }, 700);
}

function show(text){
  feedback.innerText = text;
  feedback.classList.add('show');

  clearTimeout(show.t);

  show.t = setTimeout(() => {
    feedback.classList.remove('show');
  }, 900);
}

function updateProgress(){
  progress.innerText = `${placedCount} / ${cards.length} размещено`;

  if(placedCount === cards.length){
    setTimeout(() => {
      show('Отлично! Все карточки размещены!');
    }, 300);
  }
}

document.getElementById('restartBtn').onclick = () => {
  render();
};

render();
</script>
</body>
</html>
